<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports | Smart Queue Management System</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="admin-content">
        <div class="container-fluid py-4">
            <h1 class="h3 fw-semibold mb-4">Reports</h1>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="dashboard-card"><div class="text-muted small">Total Tickets</div><div class="metric" th:text="${stats.totalTickets()}">0</div></div></div>
                <div class="col-md-3"><div class="dashboard-card"><div class="text-muted small">Waiting</div><div class="metric" th:text="${stats.waitingTickets()}">0</div></div></div>
                <div class="col-md-3"><div class="dashboard-card"><div class="text-muted small">Completed</div><div class="metric" th:text="${stats.completedTickets()}">0</div></div></div>
                <div class="col-md-3"><div class="dashboard-card"><div class="text-muted small">Active Counters</div><div class="metric" th:text="${stats.activeCounters()}">0</div></div></div>
            </div>
            <div th:replace="~{admin/token-table :: tokenTable(tokens=${tokens})}"></div>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
