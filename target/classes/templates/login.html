<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Smart Queue Management System</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="page-shell">
    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="surface-panel p-4">
                    <h1 class="h4 fw-semibold mb-4">Login</h1>
                    <div th:if="${registered}" class="alert alert-light border">Registration complete. Please log in.</div>
                    <div th:if="${param.error}" class="alert alert-light border text-danger">Invalid username or password.</div>
                    <div th:if="${param.logout}" class="alert alert-light border">You have been logged out.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Email</label>
                            <input id="username" name="username" type="email" class="form-control" autocomplete="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Login</button>
                    </form>
                    <p class="text-muted small mt-3 mb-0">Admin: admin@smartqueue.local / admin123</p>
                    <p class="text-muted small mb-0">Staff: staff@smartqueue.local / staff123</p>
                    <p class="small mt-3 mb-0">Need an account? <a class="link-dark" th:href="@{/register}">Register as user</a></p>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
