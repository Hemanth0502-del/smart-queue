<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Smart Queue Management System</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="page-shell">
    <section class="container auth-shell py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="surface-panel p-4 p-md-5">
                    <p class="section-kicker mb-2">User access</p>
                    <h1 class="h4 fw-semibold mb-4">User Registration</h1>
                    <form th:action="@{/register}" th:object="${registrationRequest}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="fullName">Full Name</label>
                            <input class="form-control" id="fullName" type="text" th:field="*{fullName}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" type="email" th:field="*{email}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="phone">Phone</label>
                            <input class="form-control" id="phone" type="text" th:field="*{phone}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" type="password" th:field="*{password}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <button class="btn btn-dark w-100" type="submit">Create Account</button>
                    </form>
                    <p class="small mt-3 mb-0 text-center">Already registered? <a class="link-dark fw-semibold" th:href="@{/login}">Login</a></p>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
