<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">Smart Queue</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar"
                aria-controls="topNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="topNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item" sec:authorize="hasRole('USER')"><a class="nav-link" th:href="@{/live}">Live Queue</a></li>
                <li class="nav-item" sec:authorize="hasRole('STAFF')"><a class="nav-link" th:href="@{/live}">Assigned Live Queue</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/live}">Assigned Live Queue</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('STAFF')"><a class="nav-link" th:href="@{/staff/dashboard}">Staff Dashboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('USER')"><a class="nav-link" th:href="@{/user/dashboard}">Generate Token</a></li>
                <li class="nav-item" sec:authorize="hasRole('USER')"><a class="nav-link" th:href="@{/user/my-token}">My Token</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('STAFF','ADMIN')" th:if="${assignedCategory != null}">
                    <span class="nav-link text-muted" th:text="${assignedCategory.name}">Hospital</span>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/register}">Register</a></li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="btn btn-dark btn-sm ms-lg-2" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="ms-lg-2">
                        <button class="btn btn-outline-dark btn-sm" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
