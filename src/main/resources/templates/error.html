<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error | Smart Queue Management System</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="page-shell">
    <section class="container py-5">
        <div class="surface-panel p-5 text-center mx-auto" style="max-width: 680px;">
            <p class="section-kicker mb-2" th:text="${statusCode}">400</p>
            <h1 class="h3 fw-semibold" th:text="${errorTitle}">Request could not be processed</h1>
            <p class="text-secondary mb-1" th:text="${errorMessage}">Please check the request and try again.</p>
            <p class="text-muted small mb-4" th:if="${path}" th:text="${path}">/path</p>
            <a class="btn btn-dark" th:href="@{/}">Go Home</a>
            <a class="btn btn-outline-dark ms-2" href="javascript:history.back()">Go Back</a>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
